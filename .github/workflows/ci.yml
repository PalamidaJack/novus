name: NOVUS CI/CD

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # Code Quality Checks
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        pip install black ruff mypy
    
    - name: Run Black
      run: black --check --diff src/novus tests/
    
    - name: Run Ruff
      run: ruff check src/novus tests/
    
    - name: Run MyPy
      run: mypy src/novus/

  # Unit Tests
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        pip install -e ".[dev]"
    
    - name: Run tests with coverage
      run: |
        pytest --cov=src/novus --cov-report=xml --cov-report=term -v
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: true

  # Integration Tests
  integration:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        pip install -e ".[dev]"
    
    - name: Run integration tests
      run: |
        pytest -m integration -v --tb=short

  # Benchmark Artifact Export (reproducible run bundles)
  benchmark-artifacts:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      pull-requests: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        pip install -e ".[dev]"

    - name: Run benchmark export
      env:
        NOVUS_BUNDLE_SIGNING_KEY: ${{ secrets.NOVUS_BUNDLE_SIGNING_KEY }}
      run: |
        EXTRA_FLAGS="--no-fail-on-regression"
        if [[ "${GITHUB_REF}" == "refs/heads/main" || "${GITHUB_REF}" == refs/tags/v* ]]; then
          EXTRA_FLAGS="--fail-on-regression"
        fi

        SIGNING_FLAGS=""
        if [ -n "${NOVUS_BUNDLE_SIGNING_KEY}" ]; then
          SIGNING_FLAGS="--signing-key ${NOVUS_BUNDLE_SIGNING_KEY}"
        fi

        novus readiness \
          --skip-tests \
          --output-dir .novus-bench \
          --baseline .github/benchmarks/baseline_snapshot.json \
          --category-thresholds .github/benchmarks/category_thresholds.json \
          --report-json .novus-bench/readiness_report.json \
          ${EXTRA_FLAGS} \
          ${SIGNING_FLAGS}

    - name: Publish benchmark summary
      run: |
        if [ -f .novus-bench/summary.md ]; then
          cat .novus-bench/summary.md >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Comment benchmark delta on PR
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require("fs");
          const path = ".novus-bench/summary.md";
          if (!fs.existsSync(path)) {
            core.info("No benchmark summary found; skipping PR comment.");
            return;
          }
          const body = fs.readFileSync(path, "utf8");
          const marker = "<!-- novus-benchmark-summary -->";
          const fullBody = `${marker}\n${body}`;

          const {owner, repo} = context.repo;
          const issue_number = context.issue.number;

          const comments = await github.paginate(
            github.rest.issues.listComments,
            {owner, repo, issue_number, per_page: 100}
          );

          const existing = comments.find(
            (c) => c.user?.type === "Bot" && c.body?.includes(marker)
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body: fullBody,
            });
            core.info(`Updated benchmark comment: ${existing.id}`);
          } else {
            const created = await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: fullBody,
            });
            core.info(`Created benchmark comment: ${created.data.id}`);
          }

    - name: Upload benchmark artifacts
      uses: actions/upload-artifact@v4
      with:
        name: novus-benchmark-${{ github.sha }}
        path: .novus-bench/
        if-no-files-found: error
        retention-days: 30

  # Build Package
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install build dependencies
      run: |
        pip install build twine
    
    - name: Build package
      run: python -m build
    
    - name: Check package
      run: twine check dist/*
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dist
        path: dist/

  # Docker Build
  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile
        push: false
        tags: novus:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Test Docker image
      run: |
        docker run --rm novus:latest python -c "import novus; print(novus.__version__)"

  # Documentation
  docs:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        pip install mkdocs mkdocs-material mkdocstrings[python]
    
    - name: Build documentation
      run: mkdocs build --strict
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site

  # Release
  release:
    runs-on: ubuntu-latest
    needs: [build, docker, integration]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Download artifacts
      uses: actions/download-artifact@v3
      with:
        name: dist
        path: dist/
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
        generate_release_notes: true
    
    # Docker Hub push
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile
        push: true
        tags: |
          novusai/novus:latest
          novusai/novus:${{ steps.version.outputs.VERSION }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
